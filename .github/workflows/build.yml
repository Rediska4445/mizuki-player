name: CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  ci-cd:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          java-version: '19'
          distribution: 'temurin'
          cache: maven

      - name: Install local dependencies
        shell: bash
        run: |
          chmod +x scripts/build/install-deps.sh
          ./scripts/build/install-deps.sh

      # 1: Запустить тесты
      - name: Run Tests
        run: mvn test "-Djava.library.path=libraries/classes" "-Dtestfx.robot=glass" "-Dtestfx.headless=true" "-Dprism.order=sw" "-Dglass.platform=Monocle" "-Dmonocle.platform=Headless"

      # 2: Выполнить сборку без тестов
      # Это проверит, что проект в принципе собирается
      - name: Build Package
        run: mvn package -DskipTests

      # : Если это пуш в main/master
      - name: Semantic Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: semantic
        shell: bash
        run: |
          npm install semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github
          npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4: Если версия изменилась
      - name: Re-build with new version
        if: steps.semantic.outputs.new_release_published == 'true'
        shell: bash
        run: |
          mvn versions:set -DnewVersion=${{ steps.semantic.outputs.new_release_version }} -DgenerateBackupPoms=false
          mvn package -DskipTests
